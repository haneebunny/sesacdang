<style>
    .glass-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      background: rgba(63, 103, 75, 0.1);
    }

      background-color: #fafafa;

      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;

<body class="font-body-md selection:bg-primary/20">
<!-- Header -->
<header class="fixed top-0 left-0 right-0 h-16 glass-card z-50 flex items-center justify-between px-margin_mobile shadow-sm">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">eco</span>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">새싹당</h1>
</div>
<button class="material-symbols-outlined text-on-surface-variant text-2xl active:scale-95 transition-transform">menu</button>
</header>
<!-- Background Decorative Element (Subtle blur) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10">
<div class="absolute top-1/4 -left-10 w-64 h-64 bg-primary-fixed opacity-20 blur-[100px] rounded-full"></div>
<div class="absolute bottom-1/4 -right-10 w-72 h-72 bg-secondary-fixed-dim opacity-20 blur-[100px] rounded-full"></div>
</div>
<!-- Main Content -->
<main class="pt-24 px-margin_mobile space-y-6 pb-32">
<!-- AI Search Bar -->
<section>
<div class="glass-card rounded-2xl p-4 flex items-center gap-3 shadow-md border-white/80">
<span class="text-xl">✨</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant p-0" placeholder="예: 4명 앉는 가성비 국밥집" type="text"/>
</div>
</section>
<!-- Quick Suggestions -->
<section class="flex overflow-x-auto no-scrollbar gap-2 -mx-margin_mobile px-margin_mobile">
<button class="glass-card px-4 py-2 rounded-full whitespace-nowrap font-label-bold text-secondary border-white/60 active:scale-95 transition-transform">혼밥 국밥</button>
<button class="glass-card px-4 py-2 rounded-full whitespace-nowrap font-label-bold text-secondary border-white/60 active:scale-95 transition-transform">4명 가성비</button>
<button class="glass-card px-4 py-2 rounded-full whitespace-nowrap font-label-bold text-secondary border-white/60 active:scale-95 transition-transform">빨리 나오는 곳</button>
<button class="glass-card px-4 py-2 rounded-full whitespace-nowrap font-label-bold text-secondary border-white/60 active:scale-95 transition-transform">따뜻한 국물</button>
</section>
<!-- AI Result Cards -->
<section class="space-y-6">
<!-- Card 1 (Prominent) -->
<div class="glass-card rounded-2xl p-5 space-y-4 shadow-lg border-white/80 relative overflow-hidden group">
<div class="absolute top-0 right-0 bg-primary-container text-white px-3 py-1 rounded-bl-xl font-label-bold text-[10px]">새싹 추천 1위</div>
<div class="flex justify-between items-start">
<div class="space-y-1">
<h2 class="font-headline-sm text-headline-sm text-on-surface">진진 가마솥 국밥</h2>
<div class="inline-flex items-center px-2 py-0.5 bg-secondary-fixed-dim/40 rounded-lg">
<span class="text-[10px] mr-1">✨</span>
<span class="font-label-sm text-on-secondary-fixed-variant">AI 추정</span>
</div>
</div>
<div class="text-right">
<div class="flex items-center justify-end gap-0.5">
<span class="material-symbols-outlined text-[#FFB300] text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-display-lg text-display-lg text-on-surface">4.3</span>
</div>
<p class="font-label-sm text-outline-variant italic">*(AI 추정)*</p>
</div>
</div>
<div class="bg-[#7FA35C]/10 p-4 rounded-xl border border-[#7FA35C]/20">
<p class="font-body-md text-on-surface-variant italic leading-relaxed">
            "얼큰한 국밥 좋아하시고 혼밥 자리 있어요. 가성비가 훌륭하며 특히 깍두기 맛집으로 소문난 곳입니다."
          </p>
</div>
<div class="flex flex-wrap gap-2">
<div class="flex items-center gap-1.5 glass-card bg-white/40 border-white/20 px-2.5 py-1 rounded-full">
<div class="w-1.5 h-1.5 rounded-full bg-status-available"></div>
<span class="font-label-sm text-on-surface-variant">도보 5분</span>
</div>
<div class="flex items-center gap-1.5 glass-card bg-white/40 border-white/20 px-2.5 py-1 rounded-full">
<div class="w-1.5 h-1.5 rounded-full bg-status-available"></div>
<span class="font-label-sm text-on-surface-variant">👥 4인석</span>
</div>
<div class="flex items-center gap-1.5 glass-card bg-white/40 border-white/20 px-2.5 py-1 rounded-full">
<div class="w-1.5 h-1.5 rounded-full bg-status-available"></div>
<span class="font-label-sm text-on-surface-variant">비플페이 O</span>
</div>
</div>
<button class="w-full py-3.5 bg-secondary text-white font-label-bold rounded-xl active:scale-[0.98] transition-all shadow-md">상세 보기</button>
</div>
<!-- Card 2 -->
<div class="glass-card rounded-2xl p-5 space-y-4 shadow-sm border-white/40">
<div class="flex justify-between items-start">
<div class="space-y-1">
<h2 class="font-headline-sm text-headline-sm text-on-surface">이화 순대국 전문</h2>
<div class="inline-flex items-center px-2 py-0.5 bg-secondary-fixed-dim/40 rounded-lg">
<span class="text-[10px] mr-1">✨</span>
<span class="font-label-sm text-on-secondary-fixed-variant">AI 추정</span>
</div>
</div>
<div class="text-right">
<div class="flex items-center justify-end gap-0.5">
<span class="material-symbols-outlined text-[#FFB300] text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-display-lg text-display-lg text-on-surface">4.1</span>
</div>
<p class="font-label-sm text-outline-variant italic">*(AI 추정)*</p>
</div>
</div>
<div class="bg-[#7FA35C]/10 p-4 rounded-xl border border-[#7FA35C]/10">
<p class="font-body-md text-on-surface-variant italic leading-relaxed">
            "담백한 국물 선호하시면 추천해요. 4인 테이블 배치가 여유롭고 음식이 5분 내로 나옵니다."
          </p>
</div>
<div class="flex flex-wrap gap-2">
<div class="flex items-center gap-1.5 glass-card bg-white/40 border-white/20 px-2.5 py-1 rounded-full">
<div class="w-1.5 h-1.5 rounded-full bg-status-available"></div>
<span class="font-label-sm text-on-surface-variant">도보 8분</span>
</div>
<div class="flex items-center gap-1.5 glass-card bg-white/40 border-white/20 px-2.5 py-1 rounded-full">
<div class="w-1.5 h-1.5 rounded-full bg-status-available"></div>
<span class="font-label-sm text-on-surface-variant">👥 단체 가능</span>
</div>
</div>
<button class="w-full py-3.5 bg-secondary text-white font-label-bold rounded-xl active:scale-[0.98] transition-all">상세 보기</button>
</div>
</section>
</main>
<!-- FAB -->
<button class="fixed bottom-24 right-6 w-14 h-14 rounded-full bg-primary-container flex items-center justify-center text-white border-2 border-white/60 shadow-xl active:scale-90 transition-transform z-40">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button>
<!-- Bottom Navigation -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-md z-50 flex justify-around items-center p-2 glass-card rounded-full border-white/80 shadow-lg">
<button class="flex flex-col items-center justify-center py-2 px-4 rounded-full text-on-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-xl">home</span>
<span class="font-label-sm mt-1">홈</span>
</button>
<button class="flex flex-col items-center justify-center py-2 px-5 rounded-full text-secondary font-bold active-nav-bg active:scale-95 transition-all relative">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">search</span>
<span class="font-label-sm mt-1">검색</span>
<div class="absolute -bottom-1 w-1 h-1 rounded-full bg-secondary"></div>
</button>
<button class="flex flex-col items-center justify-center py-2 px-4 rounded-full text-on-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-xl">rate_review</span>
<span class="font-label-sm mt-1">리뷰</span>
</button>
<button class="flex flex-col items-center justify-center py-2 px-4 rounded-full text-on-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-xl">person</span>
<span class="font-label-sm mt-1">내 페이지</span>
</button>
</nav>
<script>
    // Micro-interaction for result cards
    document.querySelectorAll('.glass-card').forEach(card => {
      card.addEventListener('click', () => {
        card.classList.add('scale-[0.99]');
        setTimeout(() => card.classList.remove('scale-[0.99]'), 100);
      });
    });

    // Handle scroll visibility of FAB/Nav for better immersion (optional refinement)
    let lastScrollY = window.scrollY;
    window.addEventListener('scroll', () => {
      const fab = document.querySelector('.fixed.bottom-24');
      if (window.scrollY > lastScrollY) {
        fab.style.transform = 'translateY(120px)';
        fab.style.transition = 'transform 0.3s ease';
      } else {
        fab.style.transform = 'translateY(0)';
      }
      lastScrollY = window.scrollY;
    });
  </script>
</body></html>
