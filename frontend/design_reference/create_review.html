<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .star-active {
            font-variation-settings: 'FILL' 1;
            color: #FFB300;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #f8fbee;
            overflow-x: hidden;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#265100",
                        "secondary": "#3f674b",
                        "surface": "#f8fbee",
                        "on-surface": "#191d15",
                        "on-surface-variant": "#42493a",
                        "outline": "#727a69",
                        "outline-variant": "#c2c9b6",
                        "primary-container": "#346b00",
                        "secondary-container": "#beebc7",
                        "on-secondary-container": "#436b4f",
                        "muted-sage": "#7FA35C",
                        "amber-rating": "#FFB300"
                    },
                    borderRadius: {
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin_mobile": "20px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px"
                    },
                    fontFamily: {
                        "headline-sm": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "display-lg": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"]
                    },
                    fontSize: {
                        "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen">
<!-- Top App Bar (Fixed) -->
<header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-margin_mobile h-16 bg-surface/80 backdrop-blur-lg border-b border-white/60">
<button aria-label="닫기" class="p-2 -ml-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface">리뷰 쓰기</h1>
<button class="font-headline-sm text-headline-sm text-muted-sage font-bold hover:opacity-80 transition-opacity">등록</button>
</header>
<!-- Main Content Area -->
<main class="pt-20 pb-32 px-margin_mobile space-y-6 max-w-2xl mx-auto">
<!-- Restaurant Context Card -->
<section class="glass-card p-4 rounded-2xl flex items-center gap-4 shadow-[0px_4px_16px_rgba(34,48,42,0.03)]">
<div class="w-12 h-12 rounded-xl overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover" data-alt="A macro shot of a modern, minimalist Korean cafeteria interior with warm wood textures, soft overhead lighting, and organized stainless steel trays, reflecting a clean and appetizing university dining atmosphere in light mode." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7AmcizJT7QygeQUKus3y5Nf1Sm9V3YQK0fhukrbyXCd5Wgy4FJ8abNc6871b0QZ_mSf67syboPknlI029Lt30IMXekuyMNagiCPQnamnVRS2kgkdAdeHNJB29rQpOd4YeGeVBQUMDE62KhR4W4ChxGwtKM4N5GN3MbtHrWaFlPk40QVZ8Hg5ltJgePQ73FupGEnDNNZ331A7e3Y7Bgmony8eV4ebDK3KMOmTpd7dGRubRxXAB1oKKmK42dQ9EK6Ji7DqT0rNyrNA"/>
</div>
<div>
<h2 class="font-headline-sm text-headline-sm">건국관 식당</h2>
<p class="font-body-md text-body-md text-on-surface-variant">한식</p>
</div>
</section>
<!-- Star Rating Section -->
<section class="flex flex-col items-center justify-center py-4 space-y-3">
<div class="flex gap-2">
<button class="star-btn active:scale-110 transition-transform" onclick="setRating(1)"><span class="material-symbols-outlined text-4xl star-active">star</span></button>
<button class="star-btn active:scale-110 transition-transform" onclick="setRating(2)"><span class="material-symbols-outlined text-4xl star-active">star</span></button>
<button class="star-btn active:scale-110 transition-transform" onclick="setRating(3)"><span class="material-symbols-outlined text-4xl star-active">star</span></button>
<button class="star-btn active:scale-110 transition-transform" onclick="setRating(4)"><span class="material-symbols-outlined text-4xl text-outline-variant">star</span></button>
<button class="star-btn active:scale-110 transition-transform" onclick="setRating(5)"><span class="material-symbols-outlined text-4xl text-outline-variant">star</span></button>
</div>
<p class="font-headline-sm text-headline-sm text-secondary">식사는 어떠셨나요?</p>
</section>
<!-- Tag Selection Section -->
<section class="space-y-4">
<div>
<h3 class="font-headline-sm text-headline-sm">이런 점이 좋았어요</h3>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                    자동 추출된 태그예요 — 골라만 주세요
                </p>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full glass-card bg-muted-sage text-white font-medium shadow-sm transition-all">혼밥good</button>
<button class="px-4 py-2 rounded-full glass-card text-on-surface-variant font-medium hover:bg-white/40 transition-all">가성비</button>
<button class="px-4 py-2 rounded-full glass-card bg-muted-sage text-white font-medium shadow-sm transition-all">빨리나옴</button>
<button class="px-4 py-2 rounded-full glass-card text-on-surface-variant font-medium hover:bg-white/40 transition-all">4인석있음</button>
<button class="px-4 py-2 rounded-full glass-card text-on-surface-variant font-medium hover:bg-white/40 transition-all">친절</button>
<button class="px-4 py-2 rounded-full glass-card text-on-surface-variant font-medium hover:bg-white/40 transition-all">양많음</button>
</div>
</section>
<!-- Comment Section -->
<section class="space-y-2">
<textarea class="w-full h-32 glass-card rounded-2xl p-4 font-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-muted-sage/30 border-white/60 resize-none transition-all" placeholder="한 줄로 남겨주세요 (선택)"></textarea>
</section>
<!-- BeplPay Toggle Row -->
<section class="glass-card p-5 rounded-2xl flex items-center justify-between shadow-[0px_4px_16px_rgba(34,48,42,0.03)]">
<div class="space-y-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-muted-sage" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-headline-sm text-body-lg font-bold">비플페이 결제 됐어요</span>
</div>
<p class="font-label-sm text-on-surface-variant">확인일 갱신에 도움이 돼요</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-muted-sage"></div>
</label>
</section>
</main>
<!-- Bottom Action Button -->
<footer class="fixed bottom-0 left-0 right-0 p-margin_mobile bg-gradient-to-t from-surface via-surface/90 to-transparent">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-primary text-white rounded-xl font-headline-sm text-headline-sm shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                리뷰 등록하기
            </button>
</div>
</footer>
<script>
        function setRating(rating) {
            const stars = document.querySelectorAll('.star-btn span');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('star-active');
                    star.classList.remove('text-outline-variant');
                } else {
                    star.classList.remove('star-active');
                    star.classList.add('text-outline-variant');
                }
            });
        }

        // Toggle logic for tag chips
        document.querySelectorAll('.flex.flex-wrap button').forEach(button => {
            button.addEventListener('click', () => {
                button.classList.toggle('bg-muted-sage');
                button.classList.toggle('text-white');
                button.classList.toggle('text-on-surface-variant');
            });
        });
    </script>
</body></html>
